<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calci">

<h2 class="caltext">Calculator</h2>

<div class="input-field">
	<input type="text" id="calci-input">
</div>

<div class="row1">
<button id="btn7" type="submit">7</button>
<button id="btn8" type="submit">8</button>
<button id="btn9" type="submit">9</button>
<button id="btnadd" type="submit">+</button>
</div>


<div class="row2">
<button id="btn4" type="button">4</button>
<button id="btn5" type="button">5</button>
<button id="btn6" type="button">6</button>
<button id="btnSub" type="button">-</button>
</div>


<div class="row3">
<button id="btn1" type="button">1</button>
<button id="btn2" type="button">2</button>
<button id="btn3" type="button">3</button>
<button id="btnMul" type="button">*</button>
</div>

<div class="row4">
<button id="btnClear" type="button">AC</button>
<button id="btn0" type="button">0</button>
<button id="btnEqual" type="button">=</button>
<button id="btnDiv" type="button">/</button>
</div>
	
</div>

<script src="script.js"></script>
</body>
</html>
